name: hol-scanner

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: HOL plugin scanner (gate at 90, fail on high)
        uses: hashgraph-online/ai-plugin-scanner-action@7efab6be3cc2e2b020492c77f769963070905d6e # v1
        with:
          plugin_dir: "."
          mode: scan
          min_score: 90
          fail_on_severity: high
          format: sarif
          upload_sarif: true
