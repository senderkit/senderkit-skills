name: validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so externally-hosted doc links that rot are caught even without a PR.
    - cron: "0 7 * * 1"

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Validate manifests and skill frontmatter (Claude/Codex/Cursor)
        run: python3 scripts/validate.py

  claude-plugin-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      # `claude plugin validate` is an offline manifest check — no API key needed.
      - name: Validate marketplace manifest (strict)
        run: claude plugin validate . --strict
      - name: Validate plugin manifest + skill components (strict)
        # The repo root holds both marketplace.json and plugin.json, so the CLI
        # validates the marketplace there. Mirror just the plugin into an
        # isolated root so the plugin manifest and its skills are validated too.
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/.claude-plugin"
          cp .claude-plugin/plugin.json "$tmp/.claude-plugin/plugin.json"
          cp -R skills "$tmp/skills"
          claude plugin validate "$tmp" --strict

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Check links in docs (Markdown + llms.txt)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          # Verify the docs' internal and external links resolve. Retry transient
          # failures, accept rate-limit responses, and skip the runtime MCP
          # endpoint (mcp.senderkit.com is an MCP transport, not a GET target).
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 10
            --accept '200..=299, 429'
            --exclude 'mcp\.senderkit\.com'
            --exclude '\$\{SENDERKIT_API_KEY\}'
            './**/*.md' './**/llms.txt'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
